<script>
    // URL da sua implantação do Google Apps Script
    const LINK_SISTEMA = "https://script.google.com/macros/s/AKfycbzITE5_PQ0mumkTKfJFGEAnsjFQQUTxcFJwCxc89nTQzWkGjfQZW_Vvr7Ga-3Tskiyn/exec";
    
    let produtosData = [];
    let carrinho = {};
    let valorTotalGeral = 0;
    let formaPagamento = "";

    // CAPTURA DOS DADOS DO WHATSAPP (Vindos do Robô 1)
    const urlParams = new URLSearchParams(window.location.search);
    const nomeCliente = urlParams.get('nome') || "Cliente";
    const telCliente = urlParams.get('tel') || "Não informado";

    // Exibe saudação personalizada se houver nome
    if (nomeCliente !== "Cliente") {
        const saudacaoDiv = document.getElementById('saudacao');
        if(saudacaoDiv) saudacaoDiv.innerText = `Olá, ${nomeCliente}!`;
    }

    // Fecha o teclado ao tocar fora (melhora experiência no celular)
    function fecharTeclado(event) {
        const campoEndereco = document.getElementById('endereco');
        if (event.target !== campoEndereco) {
            campoEndereco.blur();
        }
    }

    // Carrega os produtos da planilha
    async function carregar() {
        try {
            const res = await fetch(LINK_SISTEMA);
            produtosData = await res.json();
            const lista = document.getElementById('cardapio');
            document.getElementById('loading').style.display = 'none';
            
            produtosData.forEach((p, index) => {
                let precoLimpo = parseFloat(p.preco.toString().replace('R$', '').replace('.', '').replace(',', '.').trim());
                
                lista.innerHTML += `
                    <div class="card">
                        <img src="${p.imagem}" onerror="this.src='https://via.placeholder.com/150?text=Petisco'">
                        <span class="nome">${p.nome}</span>
                        <span class="preco">R$ ${p.preco}</span>
                        <div class="controles">
                            <button class="btn-qtd" onclick="event.stopPropagation(); mudarQtd('${p.nome}', ${precoLimpo}, -1, ${index})">−</button>
                            <span class="qtd-num" id="qtd-${index}">0</span>
                            <button class="btn-qtd" onclick="event.stopPropagation(); mudarQtd('${p.nome}', ${precoLimpo}, 1, ${index})">+</button>
                        </div>
                    </div>`;
            });
        } catch (e) {
            document.getElementById('loading').innerText = "Erro ao conectar com o cardápio.";
        }
    }

    // Gerencia as quantidades no carrinho
    function mudarQtd(nome, preco, delta, index) {
        if (!carrinho[nome]) carrinho[nome] = 0;
        const qtdAnterior = carrinho[nome];
        carrinho[nome] = Math.max(0, carrinho[nome] + delta);
        if (carrinho[nome] !== qtdAnterior) valorTotalGeral += delta * preco;
        
        document.getElementById(`qtd-${index}`).innerText = carrinho[nome];
        document.getElementById('valor-total').innerText = Math.max(0, valorTotalGeral).toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    // Define a forma de pagamento
    function setPagamento(tipo, el) {
        formaPagamento = tipo;
        document.querySelectorAll('.op-pag').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        event.stopPropagation();
    }

    // FINALIZA E ENVIA PARA A PLANILHA (Sequência Correta)
    async function finalizarPedido() {
        const endereco = document.getElementById('endereco').value;
        if (!endereco || !formaPagamento) return alert("Por favor, informe o endereço e a forma de pagamento!");
        
        const itensFiltrados = Object.entries(carrinho).filter(([_, q]) => q > 0);
        if (itensFiltrados.length === 0) return alert("Seu carrinho está vazio!");

        const pedidoTexto = itensFiltrados.map(([n, q]) => `${q}x ${n}`).join(', ');

        // ORGANIZAÇÃO DOS DADOS PARA A PLANILHA (FormData)
        const dados = new FormData();
        dados.append("data", new Date().toLocaleString("pt-BR"));
        dados.append("cliente", nomeCliente);
        dados.append("telefone", telCliente); // Captura o número real do link
        dados.append("itens", pedidoTexto);
        dados.append("total", valorTotalGeral.toFixed(2));
        dados.append("endereco", endereco);
        dados.append("pagamento", formaPagamento);

        // Envio Silencioso para a Planilha
        fetch(LINK_SISTEMA, {
            method: 'POST',
            mode: 'no-cors',
            body: dados
        });

        // Prepara mensagem de confirmação para o seu WhatsApp
        const msgWhats = encodeURIComponent(`*NOVO PEDIDO:*\n\n*Cliente:* ${nomeCliente}\n*Itens:* ${pedidoTexto}\n*Total:* R$ ${valorTotalGeral.toFixed(2)}\n*Endereço:* ${endereco}\n*Pagamento:* ${formaPagamento}`);
        
        alert("Pedido enviado! Conclua a confirmação no WhatsApp.");
        
        // Redireciona para o seu número de atendimento
        window.location.href = `https://api.whatsapp.com/send?phone=5521974535724&text=${msgWhats}`;
    }

    // Inicia o carregamento
    carregar();
</script>
