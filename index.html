<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petiscos da Cici - Cardápio VIP</title>
    <style>
        :root { 
            --primary: #d32f2f; 
            --secondary: #2e7d32; 
            --bg: #f8f9fa; 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; 
            padding-bottom: 280px; 
            color: #333;
        }

        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin: 10px 0 5px; }
        #saudacao { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 15px; }

        .grid-produtos { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .card { 
            background: white; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: var(--card-shadow); 
            display: flex; 
            flex-direction: column;
            transition: transform 0.2s;
            border: 1px solid transparent;
        }
        
        .card.selecionado { border-color: var(--primary); background: #fffdfd; }

        .card img { 
            width: 100%; 
            height: 110px; 
            object-fit: cover; 
            background: #f0f0f0;
            cursor: pointer;
        }

        .card-body { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .nome { font-weight: 700; font-size: 0.85rem; line-height: 1.2; margin-bottom: 5px; color: #222; }
        .preco { color: var(--secondary); font-weight: 800; font-size: 1rem; margin-bottom: 10px; display: block; }

        .controles { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #f1f1f1; 
            border-radius: 25px; 
            padding: 3px;
        }

        .btn-qtd { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qtd-num { font-weight: 800; font-size: 1rem; min-width: 20px; }

        /* --- NOVO LAYOUT: TELA CHEIA DO PRODUTO (FULL SCREEN) --- */
        .tela-produto {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 2000;
            flex-direction: column;
            overflow-y: auto;
            animation: deslizarTela 0.25s ease-out;
        }
        @keyframes deslizarTela {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Imagem Gigante no Topo da Tela */
        .tela-img-container {
            position: relative;
            width: 100%;
            height: 50vh; /* Ocupa metade da altura de qualquer tela */
            background: #f0f0f0;
        }
        .tela-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Seta de Retorno Estilizada sobre a Imagem */
        .tela-retorno {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 24px; font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 2002;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .tela-retorno:active { transform: scale(0.9); }
        
        /* Conteúdo Técnico e Informativo da Tela Cheia */
        .tela-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; } 
        .tela-nome { font-size: 1.4rem; font-weight: 800; color: #222; text-align: center; }
        .tela-referencia { font-size: 0.85rem; color: #666; text-align: center; line-height: 1.4; margin-top: -8px; }
        .tela-preco { color: var(--secondary); font-size: 1.5rem; font-weight: 800; text-align: center; }
        
        /* Campo Interativo de Observações */
        .tela-obs-box { display: flex; flex-direction: column; gap: 5px; margin: 5px 0; }
        .tela-obs-label { font-size: 0.85rem; font-weight: 700; color: #444; }
        .tela-obs-input { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #ddd; 
            border-radius: 12px; 
            font-size: 14px; 
            box-sizing: border-box;
            background: #fafafa;
        }
        .tela-obs-input:focus { border-color: var(--primary); outline: none; background: white; }
        
        .tela-controles-box { max-width: 180px; margin: 10px auto 0; width: 100%; }

        /* Rodapé Otimizado */
        .footer { 
            position: fixed; 
            bottom: 0; 
            left: 0; right: 0; 
            background: white; 
            padding: 15px 20px 20px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1); 
            z-index: 1000; 
            border-radius: 25px 25px 0 0; 
        }

        .input-group { position: relative; margin-bottom: 8px; }
        
        input { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            font-size: 14px; 
            box-sizing: border-box;
            background: #fafafa;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        .pagamento-opcoes { display: flex; gap: 8px; margin-bottom: 12px; }
        .op-pag { 
            flex: 1; 
            padding: 8px; 
            border-radius: 10px; 
            border: 1.5px solid #eee; 
            text-align: center; 
            font-size: 0.7rem; 
            font-weight: 700; 
            cursor: pointer;
            background: white;
            transition: 0.2s;
        }
        .op-pag.selected { 
            border-color: var(--secondary); 
            background: #e8f5e9; 
            color: var(--secondary);
            transform: scale(1.05);
        }

        .total-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
        }
        .total-label { font-weight: 700; color: #666; }
        .total-valor { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

        .btn-enviar { 
            width: 100%; 
            background: #25d366; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 14px; 
            font-weight: 800; 
            font-size: 1rem; 
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            cursor: pointer;
        }
        .btn-enviar:disabled { background: #ccc; box-shadow: none; }
    </style>
</head>
<body onclick="fecharTeclado(event)">

    <div id="container-principal">
        <h1>Petiscos da Cici 🍕</h1>
        <div id="saudacao">Carregando informações...</div>
        
        <div id="loading" style="text-align:center; padding:50px; color: #999;">Buscando delícias...</div>
        <div class="grid-produtos" id="cardapio"></div>
    </div>

    <div class="tela-produto" id="telaProduto">
        <div class="tela-img-container">
            <button class="tela-retorno" onclick="fecharTelaCheia()">➔</button>
            <img src="" class="tela-img" id="telaImg">
        </div>
        <div class="tela-body">
            <span class="tela-nome" id="telaNome"></span>
            <span class="tela-referencia">Preparado na hora com ingredientes frescos!</span>
            <span class="tela-preco" id="telaPreco"></span>
            
            <div class="tela-obs-box">
                <label class="tela-obs-label" id="labelObs">Observações do Produto:</label>
                <input type="text" class="tela-obs-input" id="telaObsInput" placeholder="Ex: Só com tomate, sem cebola...">
            </div>
            
            <div class="tela-controles-box" id="telaControles"></div>
        </div>
    </div>

    <div class="footer" id="footer-pedido">
        <div class="input-group">
            <input type="tel" id="whatsapp-cliente" placeholder="📱 Seu WhatsApp">
        </div>
        
        <div class="input-group">
            <input type="text" id="endereco" placeholder="📍 Endereço de Entrega" onclick="event.stopPropagation()">
        </div>

        <div class="pagamento-opcoes">
            <div class="op-pag" onclick="setPagamento('PIX', this)">💠 PIX</div>
            <div class="op-pag" onclick="setPagamento('Cartão', this)">💳 CARTÃO</div>
            <div class="op-pag" onclick="setPagamento('Dinheiro', this)">💵 DINHEIRO</div>
        </div>

        <div class="total-row">
            <span class="total-label">Total do Pedido:</span>
            <span class="total-valor">R$ <span id="valor-total">0,00</span></span>
        </div>
        
        <button class="btn-enviar" id="btnEnviar" onclick="finalizarPedido()">✅ FINALIZAR PEDIDO</button>
    </div>

<script>
    // CONEXÕES ORIGINAIS RIGOROSAMENTE PRESERVADAS
    const LINK_SISTEMA = "https://script.google.com/macros/s/AKfycbzITE5_PQ0mumkTKfJFGEAnsjFQQUTxcFJwCxc89nTQzWkGjfQZW_Vvr7Ga-3Tskiyn/exec";
    const FONE_ROMENIA = "40775255771";
    
    let produtosData = [];
    let carrinho = {};      // Guarda as quantidades: { "Nome do Produto": 2 }
    let observacoes = {};   // Guarda as observações: { "Nome do Produto": "Sem cebola" }
    let valorTotalGeral = 0;
    let formaPagamento = "";
    let produtoAtivoEmTelaCheia = ""; // Controla qual produto está aberto

    const urlParams = new URLSearchParams(window.location.search);
    const nomeCliente = urlParams.get('nome') || "Cliente";
    const telBruto = urlParams.get('tel') || "";

    const campoWhats = document.getElementById('whatsapp-cliente');
    const displaySaudacao = document.getElementById('saudacao');

    const apenasNumeros = telBruto.replace(/\D/g, '');
    if (apenasNumeros.length >= 10 && apenasNumeros.length <= 13) {
        campoWhats.style.display = 'none';
        campoWhats.value = telBruto;
        displaySaudacao.innerHTML = `Welcome, <b>${nomeCliente}</b>!`;
    } else {
        campoWhats.style.display = 'block';
        campoWhats.value = ""; 
        displaySaudacao.innerHTML = `Olá! Escolha seus petiscos favoritos:`;
    }

    campoWhats.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    function fecharTeclado(event) {
        if (!['endereco', 'whatsapp-cliente', 'telaObsInput'].includes(event.target.id)) {
            document.activeElement.blur();
        }
    }

    async function carregar() {
        try {
            const res = await fetch(LINK_SISTEMA);
            produtosData = await res.json();
            const lista = document.getElementById('cardapio');
            document.getElementById('loading').style.display = 'none';
            
            produtosData.forEach((p, index) => {
                let preco = typeof p.preco === 'string' 
                    ? parseFloat(p.preco.replace('R$', '').replace('.', '').replace(',', '.').trim())
                    : p.preco;

                lista.innerHTML += `
                    <div class="card" id="card-${index}">
                        <img src="${p.imagem}" onclick="abrirTelaCheia('${p.nome}', ${preco}, '${p.imagem}', ${index})" onerror="this.src='https://via.placeholder.com/150?text=Petisco'">
                        <div class="card-body">
                            <span class="nome">${p.nome}</span>
                            <span class="preco">R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                            <div class="controles" id="box-controle-${index}">
                                <button class="btn-qtd" onclick="mudarQtd('${p.nome}', ${preco}, -1, ${index}); event.stopPropagation();">−</button>
                                <span class="qtd-num" id="qtd-${index}">0</span>
                                <button class="btn-qtd" onclick="mudarQtd('${p.nome}', ${preco}, 1, ${index}); event.stopPropagation();">+</button>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) {
            document.getElementById('loading').innerText = "Erro ao carregar. Verifique a conexão.";
        }
    }

    function mudarQtd(nome, preco, delta, index) {
        if (!carrinho[nome]) carrinho[nome] = 0;
        const novaQtd = Math.max(0, carrinho[nome] + delta);
        
        carrinho[nome] = novaQtd;
        valorTotalGeral = Math.max(0, valorTotalGeral + (delta * preco));
        
        // Atualiza a listagem do cardápio principal de trás
        document.getElementById(`qtd-${index}`).innerText = novaQtd;
        
        // Se a tela cheia deste produto estiver aberta, atualiza a quantidade interna também
        const qtdTelaCheia = document.getElementById(`qtd-tela-${index}`);
        if(qtdTelaCheia) qtdTelaCheia.innerText = novaQtd;

        document.getElementById('valor-total').innerText = valorTotalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        
        const card = document.getElementById(`card-${index}`);
        if(novaQtd > 0) card.classList.add('selecionado');
        else card.classList.remove('selecionado');
    }

    // INTERATIVIDADE: COMPORTAMENTO EM TELA CHEIA (FULL SCREEN)
    function abrirTelaCheia(nome, preco, imagem, index) {
        produtoAtivoEmTelaCheia = nome;
        
        // Oculta a listagem principal e o rodapé de finalização
        document.getElementById('container-principal').style.display = 'none';
        document.getElementById('footer-pedido').style.display = 'none';
        
        const tela = document.getElementById('telaProduto');
        document.getElementById('telaImg').src = imagem;
        document.getElementById('telaNome').innerText = nome;
        document.getElementById('telaPreco').innerText = `R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        
        // Resgata observação anterior se houver
        document.getElementById('telaObsInput').value = observacoes[nome] || "";
        
        const qtdAtual = carrinho[nome] || 0;
        
        // Monta os controles de quantidade para a nova interface
        document.getElementById('telaControles').innerHTML = `
            <div class="controles">
                <button class="btn-qtd" onclick="mudarQtd('${nome}', ${preco}, -1, ${index})">−</button>
                <span class="qtd-num" id="qtd-tela-${index}">${qtdAtual}</span>
                <button class="btn-qtd" onclick="mudarQtd('${nome}', ${preco}, 1, ${index})">+</button>
            </div>`;
            
        tela.style.display = 'flex';
        window.scrollTo(0, 0);
    }

    function fecharTelaCheia() {
        if (produtoAtivoEmTelaCheia) {
            // Salva o texto inserido no campo de observações antes de fechar
            const textoObs = document.getElementById('telaObsInput').value.trim();
            if (textoObs !== "") {
                observacoes[produtoAtivoEmTelaCheia] = textoObs;
            } else {
                delete observacoes[produtoAtivoEmTelaCheia];
            }
        }
        
        document.getElementById('telaProduto').style.display = 'none';
        
        // Reexibe o cardápio principal e o rodapé
        document.getElementById('container-principal').style.display = 'block';
        document.getElementById('footer-pedido').style.display = 'block';
        
        produtoAtivoEmTelaCheia = "";
    }

    function setPagamento(tipo, el) {
        formaPagamento = tipo;
        document.querySelectorAll('.op-pag').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
    }

    async function finalizarPedido() {
        const endereco = document.getElementById('endereco').value;
        const whatsapp = campoWhats.value;
        const itensFiltrados = Object.entries(carrinho).filter(([_, q]) => q > 0);

        if (campoWhats.style.display !== 'none' && !/^\(\d{2}\)\s9\d{4}-\d{4}$/.test(whatsapp)) 
            return alert("Por favor, informe um WhatsApp válido.");
        if (itensFiltrados.length === 0) return alert("Seu carrinho está vazio!");
        if (!formaPagamento) return alert("Escolha uma forma de pagamento.");
        if (!endereco) return alert("Informe o endereço de entrega.");

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "🚀 ENVIANDO...";

        // Formatação dos itens para a Planilha incluindo as observações de forma técnica
        const stringItensPlanilha = itensFiltrados.map(([nome, q]) => {
            const obs = observacoes[nome] ? ` (Obs: ${observacoes[nome]})` : '';
            return `${q}x ${nome}${obs}`;
        }).join(', ');

        const payload = {
            nome: nomeCliente,
            telefone: whatsapp,
            itens: stringItensPlanilha,
            total: valorTotalGeral.toFixed(2),
            endereco: endereco,
            pagamento: formaPagamento
        };

        try {
            await fetch(LINK_SISTEMA, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        } catch (e) { console.log("Erro ao salvar na planilha."); }

        // Formatação limpa do texto para o WhatsApp com quebras de linha corretas
        const pedidoTextoZap = itensFiltrados.map(([nome, q]) => {
            const obs = observacoes[nome] ? `%0A   └ _Obs: ${observacoes[nome]}_` : '';
            return `*${q}x* ${nome}${obs}`;
        }).join('%0A');
        
        const totalFmt = valorTotalGeral.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

        const msg = `*Novo Pedido - Petiscos da Cici*%0A%0A` +
                   `*Cliente:* ${nomeCliente}%0A` +
                   `*WhatsApp:* ${whatsapp}%0A` +
                   `*Endereço:* ${endereco}%0A%0A` +
                   `*Itens:*%0A${pedidoTextoZap}%0A%0A` +
                   `*Total:* ${totalFmt}%0A` +
                   `*Pagamento:* ${formaPagamento}`;

        window.location.href = `https://wa.me/${FONE_ROMENIA}?text=${msg}`;
    }

    carregar();
</script>
</body>
</html>
