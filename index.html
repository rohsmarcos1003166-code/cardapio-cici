<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petiscos da Cici - Cardápio Digital</title>
    <style>
        :root { --primary: #d32f2f; --secondary: #2e7d32; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin: 10px 0 5px 0; }
        .subtitulo { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }
        .produto-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 8px; }
        .produto-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: #eee; }
        .produto-info { flex-grow: 1; margin-left: 15px; }
        .produto-nome { font-weight: bold; font-size: 1.1em; color: #333; }
        .produto-preco { color: var(--secondary); font-weight: bold; display: block; margin-top: 5px; }
        .btn-add { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: bold; }
        .carrinho-fixo { background: #fff5f5; border: 2px dashed var(--primary); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .item-carrinho { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95em; border-bottom: 1px solid #ffebeb; padding-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .total-box { font-size: 1.3em; font-weight: bold; text-align: right; margin: 15px 0; color: var(--primary); }
        .btn-finalizar { width: 100%; background: #25d366; color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Petiscos da Cici 🍕</h1>
    <p class="subtitulo">O melhor sabor da região!</p>

    <div id="loading" style="text-align:center; padding:20px; color: #999;">Buscando cardápio...</div>
    <div id="cardapio"></div>

    <div class="carrinho-fixo">
        <h3>🛒 Seu Pedido</h3>
        <div id="itens-selecionados" style="color: #666; font-style: italic;">Seu carrinho está vazio</div>
        <div class="total-box">Total: R$ <span id="valor-total">0,00</span></div>
        
        <input type="text" id="cliente-nome" placeholder="Seu Nome">
        <input type="text" id="cliente-end" placeholder="Endereço de Entrega">
        <input type="text" id="cliente-pag" placeholder="Forma de Pagamento">
        
        <button class="btn-finalizar" onclick="enviarPedido()">
            ✅ Enviar Pedido pelo WhatsApp
        </button>
    </div>
</div>

<script>
    // Link do seu Google Script (App da Web /exec)
    const LINK_SISTEMA = "https://script.google.com/macros/s/AKfycbzITE5_PQ0mumkTKfJFGEAnsjFQQUTxcFJwCxc89nTQzWkGjfQZW_Vvr7Ga-3Tskiyn/exec";

    let carrinho = [];
    let total = 0;

    async function carregarCardapio() {
        try {
            const res = await fetch(LINK_SISTEMA);
            const produtos = await res.json();
            const lista = document.getElementById('cardapio');
            document.getElementById('loading').style.display = 'none';
            
            produtos.forEach(p => {
                lista.innerHTML += `
                    <div class="produto-card">
                        <img src="${p.imagem}" class="produto-img" onerror="this.src='https://via.placeholder.com/80?text=Comida'">
                        <div class="produto-info">
                            <span class="produto-nome">${p.nome}</span>
                            <span class="produto-preco">R$ ${p.preco}</span>
                        </div>
                        <button class="btn-add" onclick="addCarrinho('${p.nome}', ${parseFloat(p.preco.toString().replace(',','.'))})">+</button>
                    </div>`;
            });
        } catch (err) {
            document.getElementById('loading').innerText = "Erro ao carregar cardápio.";
        }
    }

    function addCarrinho(nome, preco) {
        carrinho.push({nome, preco});
        total += preco;
        renderCarrinho();
    }

    function renderCarrinho() {
        const div = document.getElementById('itens-selecionados');
        const totalSpan = document.getElementById('valor-total');
        div.innerHTML = carrinho.map(i => `
            <div class="item-carrinho">
                <span>${i.nome}</span>
                <span>R$ ${i.preco.toFixed(2).replace('.',',')}</span>
            </div>
        `).join('');
        totalSpan.innerText = total.toFixed(2).replace('.',',');
    }

    async function enviarPedido() {
        const nome = document.getElementById('cliente-nome').value;
        const end = document.getElementById('cliente-end').value;
        const pag = document.getElementById('cliente-pag').value;

        if(!nome || !end || carrinho.length === 0) {
            alert("Preencha os campos e adicione itens!");
            return;
        }

        const pedidoTexto = carrinho.map(i => i.nome).join(', ');
        
        // Envia os dados para a sua planilha (POST)
        fetch(LINK_SISTEMA, { 
            method: 'POST', 
            mode: 'no-cors',
            body: JSON.stringify({
                nome: nome, 
                itens: pedidoTexto, 
                total: total.toFixed(2), 
                endereco: end, 
                pagamento: pag, 
                telefone: "Site"
            })
        });

        // Monta a mensagem para o WhatsApp
        const msg = `*Novo Pedido - Petiscos da Cici*%0A%0A*Cliente:* ${nome}%0A*Itens:* ${pedidoTexto}%0A*Total:* R$ ${total.toFixed(2).replace('.',',')}%0A*Endereço:* ${end}%0A*Pagamento:* ${pag}`;
        
        // ENVIO PARA O SEU NÚMERO DA ROMÊNIA
        window.open(`https://wa.me/40775255771?text=${msg}`);
    }

    carregarCardapio();
</script>
</body>
</html>
